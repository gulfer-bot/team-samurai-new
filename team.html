  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin: 30px;
      font-size: 40px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .box {
      background: #111;
      padding: 40px;
      border-radius: 12px;
      border: 1px solid #333;
      transition: 0.3s;
      cursor: pointer;
    }

    .box:hover {
      transform: scale(1.05);
      border-color: cyan;
    }

    a {
      text-decoration: none;
      color: white;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
